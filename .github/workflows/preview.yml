name: Publish Preview Packages

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      author-allowed: ${{ steps.authorPermissions.outputs.require-result }}
      reviewer-allowed: ${{ steps.reviewerPermissions.outputs.require-result }}
    steps:
      # Maintainers can publish directly from their PRs
      - name: Check PR author permissions
        if: github.event_name == 'pull_request'
        id: authorPermissions
        uses: actions-cool/check-user-permission@v2
        with:
          require: "write"
          username: ${{ github.event.pull_request.user.login }}

      # Non-maintainer PRs need approval from a maintainer
      - name: Check reviewer permissions
        if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
        id: reviewerPermissions
        uses: actions-cool/check-user-permission@v2
        with:
          require: "write"

  publish:
    needs: check
    if: needs.check.outputs.author-allowed == 'true' || needs.check.outputs.reviewer-allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - run: npm ci
      - run: npx vite build
      - run: npx pkg-pr-new publish
